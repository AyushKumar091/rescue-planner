<!DOCTYPE html>
<html>
<head>
<title>Emergency Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#020617;
    color:white;
}

/* 🔔 TOP BAR */
.topbar {
    height:50px;
    background:#020617;
    border-bottom:1px solid #1e293b;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:14px;
}

.alert {
    color:#ef4444;
    margin-left:20px;
}

/* LAYOUT */
.container {
    display:grid;
    grid-template-columns:260px 1fr 320px;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
    background:#020617;
    padding:15px;
    border-right:1px solid #1e293b;
}

/* MAP */
#map {
    height:100%;
}

/* RIGHT PANEL */
.right {
    background:#020617;
    padding:15px;
    border-left:1px solid #1e293b;
}

/* CARDS */
.card {
    background:#0f172a;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

/* VEHICLE STATUS */
.available { color:#22c55e; }
.busy { color:#facc15; }
.unavailable { color:#ef4444; }

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:#ef4444;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔔 TOP BAR -->
<div class="topbar">
🚑 Emergency Response Dashboard
<span class="alert" id="alertBar">No active alerts</span>
</div>

<div class="container">

<!-- LEFT -->
<div class="sidebar">

<div class="card">Active: <b id="count">0</b></div>
<div class="card">Busy: <b id="busy">0</b></div>
<div class="card">Free: <b id="free">0</b></div>

<div class="card">
<h4>Active Emergencies</h4>
<div id="emList"></div>
</div>

<div class="card">
<h4>History</h4>
<div id="historyList"></div>
</div>

</div>

<!-- MAP -->
<div id="map"></div>

<!-- RIGHT -->
<div class="right">

<div class="card">
<h4>Vehicles</h4>
<div id="vehList"></div>
</div>

<div class="card">
<h4>Analytics</h4>
<canvas id="chart"></canvas>
</div>

<button onclick="clearAll()">Reset</button>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
